name: Build Windows and Linux

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller
          python -m pip install -r requirements.txt

      - name: Build Basic
        run: python -m PyInstaller --noconfirm --clean --onefile --windowed --name IPTV-URL-Extractor-Basic iptv_url_extractor_basic.py

      - name: Build Pro
        run: python -m PyInstaller --noconfirm --clean --onefile --windowed --collect-all customtkinter --name IPTV-URL-Extractor-Pro iptv_url_extractor_pro.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: IPTV-URL-Extractor-${{ runner.os }}
          path: dist/*
